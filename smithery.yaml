# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - ftpHost
      - ftpPort
      - ftpUser
      - ftpPassword
      - ftpSecure
    properties:
      ftpHost:
        type: string
        default: localhost
        description: FTP server hostname or IP address
      ftpPort:
        type: number
        default: 21
        description: FTP server port
      ftpUser:
        type: string
        default: anonymous
        description: >
          FTP username. May be an encrypted value (enc:<iv_hex>:<tag_hex>:<ciphertext_hex>)
          when ftpEncryptionKey is provided.
      ftpPassword:
        type: string
        format: password
        default: ""
        description: >
          FTP password. Supports encrypted values (enc:<iv_hex>:<tag_hex>:<ciphertext_hex>)
          when ftpEncryptionKey is provided. Encrypt using the encrypt-env script.
      ftpEncryptionKey:
        type: string
        format: password
        description: >
          Optional 64-character hex AES-256 key used to decrypt ftpPassword and
          ftpUser at runtime. Generate with:
          node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      ftpSecure:
        type: boolean
        default: false
        description: Use secure FTP (FTPS). Ignored when ftpProtocol is sftp.
      ftpProtocol:
        type: string
        enum: [ftp, sftp]
        default: ftp
        description: >
          Protocol to use. "ftp" uses basic-ftp (port 21 default, FTPS optional).
          "sftp" uses SSH File Transfer Protocol (port 22 default, key auth automatic).
      ftpPrivateKeyPath:
        type: string
        default: ""
        description: >
          Path to SSH private key for SFTP (e.g. ~/.ssh/id_ed25519).
          Leave empty to auto-detect from ~/.ssh/id_ed25519, ~/.ssh/id_rsa, or ~/.ssh/id_ecdsa.
      ftpPassphrase:
        type: string
        format: password
        default: ""
        description: >
          Passphrase for the SSH private key (SFTP only). Supports encrypted values
          (enc:<iv>:<tag>:<ciphertext>) when ftpEncryptionKey is provided.
  commandFunction:
    |-
    (config) => ({
      command: 'node',
      args: ['build/index.js'],
      env: {
        FTP_HOST: config.ftpHost,
        FTP_PORT: String(config.ftpPort),
        FTP_USER: config.ftpUser,
        FTP_PASSWORD: config.ftpPassword,
        FTP_SECURE: String(config.ftpSecure),
        FTP_PROTOCOL: config.ftpProtocol || 'ftp',
        ...(config.ftpPrivateKeyPath ? { FTP_PRIVATE_KEY_PATH: config.ftpPrivateKeyPath } : {}),
        ...(config.ftpPassphrase ? { FTP_PASSPHRASE: config.ftpPassphrase } : {}),
        ...(config.ftpEncryptionKey ? { FTP_ENCRYPTION_KEY: config.ftpEncryptionKey } : {})
      }
    })
  exampleConfig:
    ftpHost: ftp.example.com
    ftpPort: 21
    ftpUser: your-username
    ftpPassword: your-password
    ftpSecure: false
    ftpProtocol: sftp
    ftpPrivateKeyPath: ""
    ftpPassphrase: ""
    ftpEncryptionKey: ""
