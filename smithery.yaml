# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - ftpHost
      - ftpPort
      - ftpUser
      - ftpPassword
      - ftpSecure
    properties:
      ftpHost:
        type: string
        default: localhost
        description: FTP server hostname or IP address
      ftpPort:
        type: number
        default: 21
        description: FTP server port
      ftpUser:
        type: string
        default: anonymous
        description: >
          FTP username. May be an encrypted value (enc:<iv>:<tag>:<ciphertext>)
          when ftpEncryptionKey is provided.
      ftpPassword:
        type: string
        format: password
        default: ""
        description: >
          FTP password. Supports encrypted values (enc:<iv>:<tag>:<ciphertext>)
          when ftpEncryptionKey is provided. Encrypt using the encrypt-env script.
      ftpEncryptionKey:
        type: string
        format: password
        description: >
          Optional 64-character hex AES-256 key used to decrypt ftpPassword and
          ftpUser at runtime. Generate with:
          node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      ftpSecure:
        type: boolean
        default: false
        description: Use secure FTP (FTPS)
  commandFunction:
    |-
    (config) => ({
      command: 'node',
      args: ['build/index.js'],
      env: {
        FTP_HOST: config.ftpHost,
        FTP_PORT: String(config.ftpPort),
        FTP_USER: config.ftpUser,
        FTP_PASSWORD: config.ftpPassword,
        FTP_SECURE: String(config.ftpSecure),
        ...(config.ftpEncryptionKey ? { FTP_ENCRYPTION_KEY: config.ftpEncryptionKey } : {})
      }
    })
  exampleConfig:
    ftpHost: ftp.example.com
    ftpPort: 21
    ftpUser: your-username
    ftpPassword: your-password
    ftpSecure: false
    ftpEncryptionKey: ""
